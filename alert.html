<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donation Alert</title>
  <style>
    body {
      margin: 0;
      background: transparent;
    }
    .alert-box {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 24px;
      padding: 20px 30px;
      border-radius: 15px;
      display: none;
      font-family: sans-serif;
      text-align: center;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="alert-box" id="alertBox">
    <p id="donationText"></p>
  </div>

  <!-- Firebase CDN (compat version for OBS) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <!-- Audio element (เสียงแจ้งเตือน) -->
  <audio id="donationSound" src="https://nititorn007.github.io/donate-to-liz0/donatesound.MP3"></audio>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCzrFwEPXJx6RsuiJPt48TMd6YwTr8bno0",
      authDomain: "donation-liz0.firebaseapp.com",
      databaseURL: "https://donation-liz0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "donation-liz0",
      storageBucket: "donation-liz0.firebasestorage.app",
      messagingSenderId: "471861664830",
      appId: "1:471861664830:web:cedf5d595ede7046cf456f"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const alertBox = document.getElementById('alertBox');
    const donationText = document.getElementById('donationText');
    const donationSound = document.getElementById('donationSound');

    // Set the volume of the sound (quiet)
    donationSound.volume = 0.2; // Set the volume to 20% (adjust as needed)

    database.ref("donations").on("child_added", (snapshot) => {
      const data = snapshot.val();
      
      // Set the donation text to display
      const donationMessage = `🤑💰💹 ${data.name} โดเนท ${data.amount} บาท\n"${data.text || ''}"`;
      donationText.innerText = donationMessage;
      
      // Show the alert box
      alertBox.style.display = "block";

      // Play donation sound
      donationSound.currentTime = 0;
      donationSound.play();

      // Function to speak the donation message using TTS
      const utterance = new SpeechSynthesisUtterance(data.text || ""); // Only speak the text
      utterance.lang = 'th-TH'; // Set language to Thai
      utterance.rate = 1.0; // Speed of speech

      // Handle TTS errors
      utterance.onerror = (event) => {
        console.error("Speech synthesis error:", event.error);
        alert("Sorry, speech synthesis failed.");
      };

      // Speak the donation text after the sound finishes
      setTimeout(() => {
        speechSynthesis.speak(utterance);
      }, 3000); // Wait for 3 seconds (same duration as donation sound)

      // Hide the alert box after 5 seconds
      setTimeout(() => {
        alertBox.style.display = "none";
      }, 5000);
    });
  </script>
</body>
</html>
