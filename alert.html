<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donation Alert</title>
  <style>
    body {
      margin: 0;
      background: transparent;
    }
    .alert-box {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 24px;
      padding: 20px 30px;
      border-radius: 15px;
      display: none;
      font-family: sans-serif;
      text-align: center;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="alert-box" id="alertBox">
    <p id="donationText"></p>
  </div>

  <!-- Firebase CDN (compat version for OBS) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <!-- Audio element (เสียงแจ้งเตือน) -->
  <audio id="donationSound" src="https://cdn.pixabay.com/audio/2021/08/09/audio_f6f942b1d8.mp3"></audio>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCzrFwEPXJx6RsuiJPt48TMd6YwTr8bno0",
      authDomain: "donation-liz0.firebaseapp.com",
      databaseURL: "https://donation-liz0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "donation-liz0",
      storageBucket: "donation-liz0.firebasestorage.app",
      messagingSenderId: "471861664830",
      appId: "1:471861664830:web:cedf5d595ede7046cf456f"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const alertBox = document.getElementById('alertBox');
    const donationText = document.getElementById('donationText');
    const donationSound = document.getElementById('donationSound');

    // Queue system
    const queue = [];
    let isPlaying = false;
    const startTime = Date.now(); // เวลาเปิดหน้านี้

    // ดึงโดเนทใหม่เข้า Queue
    database.ref("donations").on("child_added", (snapshot) => {
      const data = snapshot.val();
      if (data.timestamp && data.timestamp >= startTime) {
        queue.push(data);
        processQueue();
      }
    });

    function processQueue() {
      if (isPlaying || queue.length === 0) return;
      
      isPlaying = true;
      const data = queue.shift();

      // โชว์ข้อความบนจอ
      donationText.innerText = `🤑💰💹 ${data.name} โดเนท ${data.amount} บาท\n"${data.text || ''}"`;
      alertBox.style.display = "block";

      // เล่นเสียงแจ้งเตือน
      donationSound.currentTime = 0;
      donationSound.play();

      // อ่านแค่ข้อความ (Text-to-Speech)
      if (data.text) {
        const utterance = new SpeechSynthesisUtterance(data.text);
        utterance.lang = 'th-TH'; // ตั้งภาษาไทย
        utterance.rate = 1.0; // ความเร็ว
        speechSynthesis.speak(utterance);

        // รอจนกว่าจะอ่านเสร็จแล้วไปอันต่อไป
        utterance.onend = () => {
          endAlert();
        };
      } else {
        // ถ้าไม่มีข้อความ ก็รอ 5 วิแล้วไปต่อ
        setTimeout(() => {
          endAlert();
        }, 5000);
      }
    }

    function endAlert() {
      alertBox.style.display = "none";
      isPlaying = false;
      processQueue();
    }
  </script>
</body>
</html>
