<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donation Alert</title>
  <style>
    .alert-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 20px;
      border-radius: 10px;
      font-size: 20px;
      display: none; /* Hide by default */
    }
    .donation-text {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="alert-box" id="alert-box">
    <p id="donation-message"></p>
  </div>

  <script type="module">
    // Import the necessary Firebase functions
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

    // Your Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCzrFwEPXJx6RsuiJPt48TMd6YwTr8bno0",
      authDomain: "donation-liz0.firebaseapp.com",
      databaseURL: "https://donation-liz0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "donation-liz0",
      storageBucket: "donation-liz0.firebasestorage.app",
      messagingSenderId: "471861664830",
      appId: "1:471861664830:web:cedf5d595ede7046cf456f"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // Reference to the donations path in Firebase Database
    const donationsRef = ref(database, 'donations');

    // Listen for new donations
    onChildAdded(donationsRef, (snapshot) => {
      const donation = snapshot.val();
      const message = `🤑💰💹 ${donation.name} โดเนทให้ ${donation.amount} บาท!\n"${donation.text || ''}"`;

      // Get the alert box and donation message elements
      const alertBox = document.getElementById("alert-box");
      const donationMessage = document.getElementById("donation-message");

      // Display the donation message
      donationMessage.innerText = message;
      alertBox.style.display = "block";

      // Hide the alert box after 5 seconds
      setTimeout(() => {
        alertBox.style.display = "none";
      }, 5000);
    });
  </script>
</body>
</html>
