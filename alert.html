<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donation Alert</title>
  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: "Itim", cursive;
    }
    #alert-box {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 30px;
      border-radius: 20px;
      font-size: 2em;
      display: none;
      animation: fadeInOut 5s ease-in-out forwards;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      10% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      90% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    }
  </style>
</head>
<body>
  <div id="alert-box"></div>

  <!-- Firebase SDK แบบ module -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCzrFwEPXJx6RsuiJPt48TMd6YwTr8bno0",
      authDomain: "donation-liz0.firebaseapp.com",
      databaseURL: "https://donation-liz0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "donation-liz0",
      storageBucket: "donation-liz0.firebasestorage.app",
      messagingSenderId: "471861664830",
      appId: "1:471861664830:web:cedf5d595ede7046cf456f"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const alertBox = document.getElementById("alert-box");

    onChildAdded(ref(database, 'donations'), (snapshot) => {
      const donation = snapshot.val();
      showAlert(donation.name, donation.amount, donation.text);
    });

    function showAlert(name, amount, text) {
      alertBox.textContent = `${name} โดเนท ${amount} บาท 💸\n${text || ''}`;
      alertBox.style.display = "block";

      // รีเซ็ต animation เพื่อให้แสดงใหม่ทุกครั้ง
      alertBox.style.animation = "none";
      void alertBox.offsetWidth; // trick
      alertBox.style.animation = null;

      setTimeout(() => {
        alertBox.style.display = "none";
      }, 5000); // ซ่อนหลัง 5 วินาที
    }
  </script>
</body>
</html>
