<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donation Alert</title>
  <style>
    body {
      margin: 0;
      font-family: 'Itim', cursive;
      background: transparent;
    }
    .alert-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 30px 40px;
      border-radius: 20px;
      font-size: 28px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="alert-box" id="alert-box">
    <p id="donation-message"></p>
  </div>

  <!-- ✅ Firebase Classic CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCPOgTSfuUh4p1APTZilBi3oIlBfPHwC4Y",
      authDomain: "donate-to-liz0.firebaseapp.com",
      databaseURL: "https://donate-to-liz0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "donate-to-liz0",
      storageBucket: "donate-to-liz0.firebasestorage.app",
      messagingSenderId: "99773670489",
      appId: "1:99773670489:web:f3f6008c23d65454e2fd48"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const alertBox = document.getElementById("alert-box");
    const donationMessage = document.getElementById("donation-message");

    db.ref("donations").on("child_added", (snapshot) => {
      const donation = snapshot.val();
      const message = `🤑 ${donation.name} โดเนท ${donation.amount} บาท!\n"${donation.text || ''}"`;

      donationMessage.innerText = message;
      alertBox.style.display = "block";

      setTimeout(() => {
        alertBox.style.display = "none";
      }, 5000);
    });
  </script>
</body>
</html>
