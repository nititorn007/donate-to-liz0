<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donation Alert</title>
  <style>
    .alert-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 20px;
      border-radius: 10px;
      font-size: 20px;
      display: none; /* Hide by default */
    }
    .donation-text {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="alert-box" id="alert-box">
    <p id="donation-message"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCPOgTSfuUh4p1APTZilBi3oIlBfPHwC4Y",
      authDomain: "donate-to-liz0.firebaseapp.com",
      databaseURL: "https://donate-to-liz0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "donate-to-liz0",
      storageBucket: "donate-to-liz0.appspot.com",
      messagingSenderId: "99773670489",
      appId: "1:99773670489:web:f3f6008c23d65454e2fd48",
      measurementId: "G-HTS1HRRJDB"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const donationsRef = ref(database, "donations");

    onChildAdded(donationsRef, (snapshot) => {
      const donation = snapshot.val();
      const message = `🤑💰💹 ${donation.name} โดเนทให้ ${donation.amount} บาท!\n"${donation.text || ''}"`;

      const alertBox = document.getElementById("alert-box");
      const donationMessage = document.getElementById("donation-message");

      donationMessage.innerText = message;
      alertBox.style.display = "block";

      setTimeout(() => {
        alertBox.style.display = "none";
      }, 5000);
    });
  </script>
</body>
</html>
