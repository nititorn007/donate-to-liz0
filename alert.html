<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donation Alert</title>
  <style>
    .alert-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 20px;
      border-radius: 10px;
      font-size: 20px;
      display: none; /* Hide by default */
    }
    .donation-text {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="alert-box" id="alert-box">
    <p id="donation-message"></p>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
  <script type="module">
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCzrFwEPXJx6RsuiJPt48TMd6YwTr8bno0",
      authDomain: "donation-liz0.firebaseapp.com",
      databaseURL: "https://donation-liz0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "donation-liz0",
      storageBucket: "donation-liz0.firebasestorage.app",
      messagingSenderId: "471861664830",
      appId: "1:471861664830:web:cedf5d595ede7046cf456f"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Reference to your donations data in Firebase
    const donationsRef = database.ref('donations');

    // Listen for new donations added to the Firebase database
    donationsRef.on('child_added', (snapshot) => {
      const donation = snapshot.val();
      console.log('Donation received:', donation); // Debugging line

      const message = `🤑💰💹 ${donation.name} โดเนทให้ ${donation.amount} บาท!\n"${donation.text || ''}"`;

      // Display the donation message in the alert box
      const alertBox = document.getElementById("alert-box");
      const donationMessage = document.getElementById("donation-message");

      donationMessage.innerText = message;
      alertBox.style.display = "block";

      // Hide the alert box after 5 seconds
      setTimeout(() => {
        alertBox.style.display = "none";
      }, 5000);
    });
  </script>
</body>
</html>
